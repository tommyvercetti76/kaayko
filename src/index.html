  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Kaayko",
    "url": "https://kaayko.com",
    "logo": "https://kaayko.com/kaayko-logo-512.png",
    "description": "Kaayko builds Karma, Store, Paddle Out, and Alumni OS."
  }
  </script>

  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <meta name="theme-color" content="#080808">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --panel-a: #0d0c0a;
      --panel-b: #111315;
      --panel-c: #10110d;
      --panel-d: #0c1012;
      --fg: #ede8df;
      --muted: rgba(237, 232, 223, 0.58);
      --line: rgba(181, 147, 90, 0.74);
      --gold: #b5935a;
      --gold-bright: #d9bd7b;
      --ease: cubic-bezier(0.76, 0, 0.24, 1);
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    .shell {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      isolation: isolate;
    }

    .brand-ghost {
      position: fixed;
      inset: 50% auto auto 50%;
      width: min(38vw, 340px);
      min-width: 180px;
      opacity: 0.035;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
    }

    .page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 360ms ease;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    .choice {
      position: relative;
      flex: 1 1 50%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      appearance: none;
      background: var(--panel-a);
      color: inherit;
      cursor: pointer;
      overflow: hidden;
      text-decoration: none;
      transition: filter 320ms ease;
    }

    .choice.secondary {
      background: var(--panel-b);
    }

    #pg-karma .choice.primary {
      background: var(--panel-c);
    }

    #pg-karma .choice.secondary {
      background: var(--panel-d);
    }

    .choice::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.035), transparent 42%);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .choice-glow {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 0;
      width: clamp(220px, 34vw, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217, 189, 123, 0.24), rgba(217, 189, 123, 0.085) 34%, transparent 68%);
      opacity: 0;
      pointer-events: none;
      transform: translate3d(-50%, -50%, 0);
      transition: opacity 260ms ease;
      will-change: transform, opacity;
    }

    .choice::after {
      content: attr(data-kicker);
      position: absolute;
      left: 50%;
      bottom: clamp(4.5rem, 9vh, 6.5rem);
      max-width: min(78vw, 360px);
      transform: translateX(-50%) translateY(10px);
      color: var(--muted);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(0.78rem, 1.6vw, 0.96rem);
      font-style: italic;
      letter-spacing: 0.12em;
      line-height: 1.45;
      opacity: 0;
      text-align: center;
      transition: opacity 320ms ease, transform 320ms var(--ease);
    }

    .choice-label {
      position: relative;
      z-index: 1;
      font-family: "Bebas Neue", Impact, sans-serif;
      width: min(78%, 10.5em);
      max-width: calc(100% - clamp(2rem, 8vw, 7rem));
      overflow: hidden;
      font-size: clamp(3.2rem, 7.2vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 0.92;
      text-align: center;
      text-transform: uppercase;
      white-space: nowrap;
      transition: color 260ms ease, transform 360ms var(--ease);
    }

    .seam {
      position: absolute;
      left: 7%;
      right: 7%;
      top: 50%;
      z-index: 3;
      height: 1px;
      background: var(--line);
      pointer-events: none;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 760ms cubic-bezier(0.16, 1, 0.3, 1) 120ms;
    }

    .page.active .seam {
      transform: scaleX(1);
    }

    .mark {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 4;
      transform: translate(-50%, -50%);
      color: var(--gold);
      font-size: clamp(0.52rem, 1.65vw, 0.72rem);
      font-style: italic;
      letter-spacing: 0.62em;
      opacity: 0;
      pointer-events: none;
      text-transform: lowercase;
      transition: opacity 300ms ease 420ms;
      white-space: nowrap;
    }

    .page.active .mark {
      opacity: 0.86;
    }

    .footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(1rem, env(safe-area-inset-bottom));
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 clamp(1.15rem, 5vw, 3.2rem);
      pointer-events: none;
    }

    .footer a,
    .back {
      color: rgba(181, 147, 90, 0.48);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(0.7rem, 1.55vw, 0.84rem);
      font-style: italic;
      letter-spacing: 0.24em;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 220ms ease, transform 300ms var(--ease);
      pointer-events: auto;
      white-space: nowrap;
    }

    .footer a:hover,
    .footer a:focus-visible,
    .back:hover,
    .back:focus-visible {
      color: var(--gold-bright);
    }

    .back {
      position: fixed;
      left: clamp(1.15rem, 5vw, 3.2rem);
      top: max(1rem, env(safe-area-inset-top));
      z-index: 9;
      border: 0;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
    }

    .back.show {
      opacity: 1;
      pointer-events: auto;
    }

    .back:hover,
    .back:focus-visible {
      transform: translateX(-5px);
    }

    .choice:focus-visible,
    .back:focus-visible,
    .footer a:focus-visible {
      outline: 1px solid var(--gold-bright);
      outline-offset: 8px;
    }

    @media (hover: hover) and (pointer: fine) {
      .choice:hover::before,
      .choice:focus-visible::before,
      .choice:hover::after,
      .choice:focus-visible::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .choice:hover .choice-label,
      .choice:focus-visible .choice-label {
        color: var(--gold-bright);
        transform: translateY(-5px);
      }
    }

    .choice.is-hot::before {
      opacity: 1;
    }

    .choice.is-hot .choice-glow {
      opacity: 1;
    }

    .choice.is-hot .choice-label {
      color: var(--gold-bright);
      transform: translateY(-5px);
    }

    @media (min-width: 720px) {
      .page {
        flex-direction: row;
      }

      .seam {
        top: 7%;
        bottom: 7%;
        left: 50%;
        right: auto;
        width: 1px;
        height: auto;
        transform: scaleY(0);
      }

      .page.active .seam {
        transform: scaleY(1);
      }

      .mark {
        writing-mode: vertical-rl;
      }
    }

    @media (max-width: 520px) {
      .choice-label {
        width: min(84%, 9.6em);
        max-width: calc(100% - 1.5rem);
        font-size: clamp(3rem, 15vw, 5.2rem);
        letter-spacing: 0.055em;
      }

      .choice::after {
        bottom: clamp(3.8rem, 8vh, 4.6rem);
        font-size: 0.76rem;
        letter-spacing: 0.08em;
      }

      .footer {
        padding-inline: 1rem;
      }

      .footer a,
      .back {
        font-size: 0.66rem;
        letter-spacing: 0.18em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Kaayko landing">
    <img class="brand-ghost" src="/kaayko-logo-512.png" alt="" aria-hidden="true">

    <section class="page active" id="pg-home" aria-label="Kaayko">
      <div class="seam"></div>
      <div class="mark">kaayko</div>
      <button class="choice primary" id="go-karma" type="button" data-kicker="Signals, schools, water, memory">
        <span class="choice-label" data-text="Karma">Karma</span>
      </button>
      <a class="choice secondary" href="/store" target="_blank" rel="noopener noreferrer" data-kicker="Small runs, sharp artifacts">
        <span class="choice-label" data-text="Store">Store</span>
      </a>
    </section>

    <section class="page" id="pg-karma" aria-label="Karma">
      <div class="seam"></div>
      <div class="mark">karma</div>
      <a class="choice primary" href="/paddlingout" target="_blank" rel="noopener noreferrer" data-kicker="Know before you paddle">
        <span class="choice-label" data-text="Paddle Out">Paddle Out</span>
      </a>
      <a class="choice secondary" href="https://alumni.kaayko.com" data-kicker="A private operating system for alumni communities">
        <span class="choice-label" data-text="Alumni OS">Alumni OS</span>
      </a>
    </section>

    <button class="back" id="back" type="button" aria-label="Return to Kaayko">Kaayko</button>

    <footer class="footer" aria-label="Footer">
      <a href="https://www.instagram.com/kaayko" rel="noopener noreferrer">Instagram</a>
      <a href="mailto:rohan@kaayko.com">Contact</a>
    </footer>
  </main>

  <script>
    const POOL = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const home = document.getElementById("pg-home");
    const karma = document.getElementById("pg-karma");
    const back = document.getElementById("back");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let current = home;
    let busy = false;
    let currentLayer = "home";

    function wrapLabel(label) {
      const text = label.dataset.text || label.textContent.trim();
      const choice = label.closest(".choice");

      if (choice) {
        choice.setAttribute("aria-label", text);
      }

      label.dataset.text = text;
      label.textContent = text;
    }

    function scramble(page) {
      if (prefersReducedMotion) return;

      page.querySelectorAll(".choice-label").forEach((label, wordIndex) => {
        const target = label.dataset.text || label.textContent.trim();
        const chars = Array.from(target);
        const maxTicks = 11;
        let tick = 0;

        window.setTimeout(() => {
          const interval = window.setInterval(() => {
            label.textContent = chars.map((char, index) => {
              if (char === " ") return " ";
              if (tick > maxTicks - Math.min(index, 5)) return char;
              return POOL[Math.floor(Math.random() * POOL.length)];
            }).join("");

            tick += 1;

            if (tick > maxTicks + 2) {
              window.clearInterval(interval);
              label.textContent = target;
            }
          }, 38);
        }, wordIndex * 90);
      });
    }

    function attachCursorGlow(choice) {
      const glow = document.createElement("span");
      const state = { x: 0, y: 0, tx: 0, ty: 0, frame: 0 };
      glow.className = "choice-glow";
      glow.setAttribute("aria-hidden", "true");
      choice.prepend(glow);

      const render = () => {
        state.x += (state.tx - state.x) * 0.18;
        state.y += (state.ty - state.y) * 0.18;
        glow.style.transform = `translate3d(${state.x}px, ${state.y}px, 0) translate(-50%, -50%)`;

        if (choice.classList.contains("is-hot")) {
          state.frame = window.requestAnimationFrame(render);
          return;
        }

        state.frame = 0;
      };

      const updateTarget = (event) => {
        const rect = choice.getBoundingClientRect();
        state.tx = event.clientX - rect.left;
        state.ty = event.clientY - rect.top;
      };

      choice.addEventListener("pointerenter", (event) => {
        updateTarget(event);
        state.x = state.tx;
        state.y = state.ty;
        choice.classList.add("is-hot");

        if (!state.frame) {
          state.frame = window.requestAnimationFrame(render);
        }
      });

      choice.addEventListener("pointermove", updateTarget);
      choice.addEventListener("pointerleave", () => {
        choice.classList.remove("is-hot");
      });
    }

    function show(page, options = {}) {
      if (busy || page === current) return;

      busy = true;
      current.classList.remove("active");
      current = page;
      current.classList.add("active");
      back.classList.toggle("show", current !== home);
      currentLayer = current === home ? "home" : "karma";
      scramble(current);

      if (options.pushState && currentLayer === "karma") {
        window.history.pushState({ layer: "karma" }, "", "#karma");
      }

      window.setTimeout(() => {
        busy = false;
      }, 420);
    }

    document.querySelectorAll(".choice-label").forEach(wrapLabel);
    document.querySelectorAll(".choice").forEach(attachCursorGlow);
    window.history.replaceState({ layer: "home" }, "", window.location.href.split("#")[0]);
    document.getElementById("go-karma").addEventListener("click", () => show(karma, { pushState: true }));
    back.addEventListener("click", () => {
      if (currentLayer === "karma" && window.location.hash === "#karma") {
        window.history.back();
        return;
      }

      show(home);
    });
    window.addEventListener("popstate", (event) => {
      const layer = event.state && event.state.layer;
      show(layer === "karma" ? karma : home);
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (currentLayer === "karma" && window.location.hash === "#karma") {
          window.history.back();
          return;
        }

        show(home);
      }
    });

    scramble(home);
  </script>
</body>
</html>
