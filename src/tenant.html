<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>KORTEX Tenant Portal | Kaayko</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://*.run.app http://127.0.0.1:5001;">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <style>
    @font-face{font-family:Josefin;src:url('/fonts/JosefinSans-Regular.ttf') format('truetype')}
    @font-face{font-family:Josefin;font-weight:700;src:url('/fonts/JosefinSans-Bold.ttf') format('truetype')}
    :root{color-scheme:dark;--bg:#090909;--panel:#101010;--panel2:#151515;--line:#242424;--text:#f7f1df;--muted:#a99f87;--gold:#d8aa46;--ok:#4ade80;--bad:#fb7185}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Josefin,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .shell{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}
    header,footer{border-color:var(--line);border-style:solid;border-width:0 0 1px;padding:16px 22px;display:flex;justify-content:space-between;gap:16px;align-items:center}
    footer{border-width:1px 0 0;color:var(--muted);font-size:13px}
    .brand{font-weight:700;letter-spacing:.12em;color:var(--gold)}
    .tenant-chip{border:1px solid rgba(216,170,70,.28);color:var(--gold);border-radius:999px;padding:7px 11px;font-size:12px}
    main{display:grid;place-items:center;padding:32px 18px}
    .panel{width:min(760px,100%);background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:8px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.28)}
    .eyebrow{color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px}
    h1{margin:0 0 10px;font-size:clamp(28px,5vw,46px);line-height:1.05;letter-spacing:0}
    p{margin:0;color:var(--muted);line-height:1.55}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
    a.button,button{appearance:none;border:0;background:var(--gold);color:#080808;border-radius:6px;padding:12px 16px;font:700 13px Josefin,sans-serif;text-transform:uppercase;letter-spacing:.06em;text-decoration:none;cursor:pointer}
    a.secondary,button.secondary{background:transparent;color:var(--text);border:1px solid var(--line)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:24px}
    .metric{border:1px solid var(--line);border-radius:8px;padding:14px;background:rgba(255,255,255,.025)}
    .metric strong{display:block;font-size:24px}
    .metric span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
    form{display:grid;gap:12px;margin-top:22px}
    label{display:grid;gap:5px;color:var(--muted);font-size:13px}
    input,textarea{width:100%;border:1px solid var(--line);background:#090909;color:var(--text);border-radius:6px;padding:11px 12px;font:15px Josefin,sans-serif}
    textarea{min-height:92px;resize:vertical}
    .status{margin-top:16px;padding:12px;border:1px solid var(--line);border-radius:8px;color:var(--muted)}
    .status.ok{border-color:rgba(74,222,128,.35);color:var(--ok)}
    .status.bad{border-color:rgba(251,113,133,.35);color:var(--bad)}
    .hidden{display:none}
    @media(max-width:640px){header{align-items:flex-start;flex-direction:column}.panel{padding:22px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">KAAYKO KORTEX</div>
      <div id="tenantChip" class="tenant-chip">Resolving tenant</div>
    </header>
    <main>
      <section class="panel">
        <div id="eyebrow" class="eyebrow">Tenant Portal</div>
        <h1 id="title">Loading KORTEX link</h1>
        <p id="description">We are resolving the tenant, destination, and tracking context for this link.</p>
        <div id="actions" class="actions"></div>
        <div id="metrics" class="grid hidden"></div>
        <form id="registrationForm" class="hidden">
          <label>Organization or school
            <input id="orgName" autocomplete="organization" required>
          </label>
          <label>Contact email
            <input id="contactEmail" type="email" autocomplete="email" required>
          </label>
          <label>What should this alumni page support?
            <textarea id="message" placeholder="Registrations, philanthropy campaign, member-only alumni updates..."></textarea>
          </label>
          <button type="submit">Submit Registration</button>
        </form>
        <div id="status" class="status hidden"></div>
      </section>
    </main>
    <footer>
      <span>Tenant links, alumni pages, campaigns, and performance tracking</span>
      <span>kortex v2</span>
    </footer>
  </div>
  <script src="/js/tenant-portal.js"></script>
</body>
</html>
