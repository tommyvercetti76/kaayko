<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kamera Quest – Instant camera settings for every shooting scenario." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:ital,wght@0,300;0,400;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <title>Kamera Quest</title>
    <script>
      (function () {
        const LIVE_API_BASE   = 'https://api-vwcc5j4qda-uc.a.run.app';
        const LEGACY_API_BASE = 'https://us-central1-kaaykostore.cloudfunctions.net/api';
        window.__KAMERA_QUEST_API_BASE__ = LIVE_API_BASE;
        // Transparently rewrite legacy API calls to the live endpoint
        var _fetch = window.fetch ? window.fetch.bind(window) : null;
        if (!_fetch) return;
        window.fetch = function(input, init) {
          if (typeof input === 'string' && input.startsWith(LEGACY_API_BASE)) {
            input = LIVE_API_BASE + input.slice(LEGACY_API_BASE.length);
          } else if (input instanceof Request && input.url.startsWith(LEGACY_API_BASE)) {
            input = new Request(LIVE_API_BASE + input.url.slice(LEGACY_API_BASE.length), input);
          }
          return _fetch(input, init);
        };
      })();
    </script>
    <link rel="stylesheet" href="/karma/kameras/assets/kamera-evf.css?v=20260308-2">
  </head>
