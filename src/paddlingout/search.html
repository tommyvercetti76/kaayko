  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <meta name="theme-color" content="#d4af37">

  <!-- Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://api-vwcc5j4qda-uc.a.run.app">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

  <style>
    /* ── Brand tokens (mirrors paddlingout.css) ── */
    :root {
      --bg:          #080808;
      --panel-a:     #0d0c0a;
      --fg:          #ede8df;
      --muted:       rgba(237,232,223,0.58);
      --gold:        #b5935a;
      --gold-bright: #d9bd7b;
      --line:        rgba(181,147,90,0.74);
      --font-serif:  'Cormorant Garamond', Georgia, serif;
      --font-sans:   'Josefin Sans', Arial, sans-serif;
      --ease:        cubic-bezier(0.76, 0, 0.24, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-serif);
      min-height: 100vh;
    }

    /* Hide generic shared header — we use po-page-header */
    .header { display: none !important; }
    .theme-toggle-icon { display: none !important; }

    /* ── In-page brand bar (mirrors paddlingout.css) ── */
    .po-page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 2rem 2rem 1.25rem;
      border-bottom: 1px solid rgba(181,147,90,0.18);
    }
    .po-brand { display: flex; flex-direction: column; gap: 0.2rem; }
    .po-eyebrow {
      font-family: var(--font-serif);
      font-size: 0.78rem;
      font-style: italic;
      letter-spacing: 0.28em;
      color: var(--gold);
      opacity: 0.82;
      text-transform: lowercase;
    }
    .po-title {
      font-family: var(--font-sans);
      font-size: clamp(1.55rem, 4vw, 2.1rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-bright);
      line-height: 1;
    }
    .po-back-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(181,147,90,0.36);
      border-radius: 50%;
      background: rgba(181,147,90,0.08);
      color: var(--gold);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease;
      margin-bottom: 0.15rem;
    }
    .po-back-btn:hover {
      background: rgba(181,147,90,0.18);
      border-color: var(--gold);
    }

    /* ── Search page layout ── */
    main.search-page {
      padding: 2rem 2rem 4rem;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Search bar ── */
    .search-bar-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-bar-wrap { position: relative; width: 100%; }
    .search-input {
      width: 100%;
      padding: 14px 44px 14px 44px;
      background: rgba(181,147,90,0.06);
      border: 1.5px solid rgba(181,147,90,0.28);
      border-radius: 12px;
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--gold-bright);
      box-shadow: 0 0 0 3px rgba(181,147,90,0.12);
    }
    .search-input::placeholder { color: rgba(237,232,223,0.3); }

    .search-icon-left {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--gold); font-size: 20px; pointer-events: none;
    }
    .search-clear-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 4px; display: none;
    }
    .search-clear-btn.visible { display: block; }

    .btn-gps {
      padding: 0 16px;
      background: rgba(181,147,90,0.08);
      border: 1.5px solid rgba(181,147,90,0.28);
      border-radius: 12px;
      color: var(--gold);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-gps:hover { background: rgba(181,147,90,0.18); border-color: var(--gold); }
    .btn-gps.loading { animation: gps-pulse 1s ease-in-out infinite; }
    @keyframes gps-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Status ── */
    .search-status {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 2px 10px;
      min-height: 20px;
    }
    .search-status.error   { color: #f87171; }
    .search-status.loading { color: var(--gold); }

    /* ── Popular chips ── */
    .popular-section { margin-bottom: 24px; }
    .popular-label {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .popular-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .popular-chip {
      font-family: var(--font-sans);
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 7px 13px;
      background: rgba(181,147,90,0.06);
      border: 1px solid rgba(181,147,90,0.2);
      border-radius: 50px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s var(--ease);
      display: flex; align-items: center; gap: 6px;
    }
    .popular-chip:hover {
      border-color: var(--gold);
      background: rgba(181,147,90,0.12);
      color: var(--gold-bright);
    }
    .popular-chip .chip-icon { font-size: 14px; opacity: 0.7; }

    /* ── Results header ── */
    .results-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 12px;
      opacity: 0; transition: opacity 0.3s;
    }
    .results-header.visible { opacity: 1; }
    .results-count {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .results-hint {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Water card ── */
    .water-card {
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(135deg, rgba(13,12,10,0.9), rgba(16,17,13,0.9));
      border: 1px solid rgba(181,147,90,0.16);
      border-radius: 12px;
      padding: 13px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, transform 0.2s var(--ease);
      opacity: 0; transform: translateY(6px);
      animation: card-in 0.25s ease forwards;
    }
    .water-card:hover {
      border-color: var(--gold);
      background: linear-gradient(135deg, rgba(181,147,90,0.06), rgba(181,147,90,0.03));
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 40px rgba(181,147,90,0.06);
    }
    @keyframes card-in { to { opacity: 1; transform: translateY(0); } }

    /* Skeleton */
    .water-card.skeleton { cursor: default; pointer-events: none; }
    .water-card.skeleton:hover { transform: none; border-color: rgba(181,147,90,0.16); box-shadow: none; }
    .skel {
      height: 11px; border-radius: 5px;
      background: rgba(181,147,90,0.08);
      animation: skel-pulse 1.4s ease-in-out infinite;
    }
    @keyframes skel-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }

    .water-card-info { flex: 1; min-width: 0; }
    .water-card-name {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--gold-bright);
      margin: 0 0 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .water-card-meta {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.85rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .type-chip {
      font-family: var(--font-sans);
      font-style: normal;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px; border-radius: 50px;
      background: rgba(181,147,90,0.1);
      color: var(--gold);
      border: 1px solid rgba(181,147,90,0.2);
    }

    /* Score ring */
    .score-ring-wrap { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
    .score-ring-svg  { width: 48px; height: 48px; display: block; }
    .score-track { fill: none; stroke: rgba(181,147,90,0.12); stroke-width: 4; }
    .score-fill  { fill: none; stroke-width: 4; stroke-linecap: round; }
    .score-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-sans);
      font-size: 11px; font-weight: 700; pointer-events: none;
      color: var(--fg);
    }
    .score-spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(181,147,90,0.1);
      border-top-color: rgba(181,147,90,0.5);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Map button */
    .btn-map {
      width: 34px; height: 34px; background: none;
      border: 1px solid rgba(181,147,90,0.18);
      border-radius: 8px; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: 18px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-map:hover { border-color: var(--gold); color: var(--gold-bright); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 40px 24px;
      opacity: 0; animation: card-in 0.3s 0.1s ease forwards;
    }
    .empty-state .mat { font-size: 40px; color: rgba(181,147,90,0.3); margin-bottom: 12px; }
    .empty-state h3 {
      font-family: var(--font-sans); font-size: 1rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold); margin: 0 0 8px;
    }
    .empty-state p {
      font-family: var(--font-serif); font-style: italic;
      font-size: 0.95rem; color: var(--muted); margin: 0;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem 2rem;
      color: var(--muted);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      border-top: 1px solid rgba(181,147,90,0.12);
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      .po-page-header { padding: 1.4rem 1.1rem 1rem; }
      .po-title { font-size: 1.4rem; }
      main.search-page { padding: 1.5rem 1rem 4rem; }
      .btn-map { display: none; }
    }
  </style>
</head>
<body>

  <!-- IN-PAGE BRAND BAR (matches paddlingout.html) -->
  <div class="po-page-header">
    <a class="po-back-btn" href="/paddlingout" aria-label="Back to Paddling Out">←</a>
    <div class="po-brand" style="text-align:right">
      <span class="po-eyebrow">Paddling Out</span>
      <h1 class="po-title">Search</h1>
    </div>
  </div>

  <main class="search-page">

    <!-- Search bar + GPS -->
    <div class="search-bar-row">
      <div class="search-bar-wrap" style="width:100%">
        <span class="material-icons search-icon-left">water</span>
        <input type="text" id="search-input" class="search-input"
          placeholder="Lake, river, city…"
          autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="search-clear-btn material-icons" id="search-clear" aria-label="Clear">close</button>
      </div>
      <button class="btn-gps material-icons" id="btn-gps" title="Use my location" aria-label="Use my location">my_location</button>
    </div>

    <!-- Status -->
    <div class="search-status" id="search-status"></div>

    <!-- Popular spots (hidden once results show) -->
    <div class="popular-section" id="popular-section">
      <div class="popular-label">Popular paddle regions</div>
      <div class="popular-chips">
        <button class="popular-chip" data-lat="33.0815" data-lng="-96.4775"><span class="chip-icon material-icons">water</span>Lavon Lake, TX</button>
        <button class="popular-chip" data-lat="33.1439" data-lng="-96.9759"><span class="chip-icon material-icons">water</span>Lewisville Lake, TX</button>
        <button class="popular-chip" data-lat="47.6553" data-lng="-122.2571"><span class="chip-icon material-icons">water</span>Lake Washington, WA</button>
        <button class="popular-chip" data-lat="39.0931" data-lng="-120.0325"><span class="chip-icon material-icons">water</span>Lake Tahoe, CA</button>
        <button class="popular-chip" data-lat="44.4759" data-lng="-110.5886"><span class="chip-icon material-icons">water</span>Yellowstone Lake, WY</button>
        <button class="popular-chip" data-lat="43.9520" data-lng="-76.1743"><span class="chip-icon material-icons">water</span>Lake Ontario, NY</button>
        <button class="popular-chip" data-lat="51.5085" data-lng="-0.1257"><span class="chip-icon material-icons">water</span>London, UK</button>
        <button class="popular-chip" data-lat="-33.8688" data-lng="151.2093"><span class="chip-icon material-icons">water</span>Sydney, AU</button>
      </div>
    </div>

    <!-- Results -->
    <div id="results-header" class="results-header">
      <span class="results-count" id="results-count"></span>
      <span class="results-hint"  id="results-hint"></span>
    </div>
    <div id="results-list"></div>

  </main>

  <footer>
    <p>&copy; <span id="year"></span> Kaayko. All rights reserved.</p>
  </footer>

  <script src="/js/services/apiClient.js"></script>
  <script src="/js/services/dataTransformer.js"></script>
  <script src="/js/searchPage.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const y = document.getElementById('year');
      if (y) y.textContent = new Date().getFullYear();
    });
  </script>
</body>
</html>
