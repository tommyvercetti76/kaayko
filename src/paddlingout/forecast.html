<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <script src="/js/prod-config.js"></script>
  <script>document.documentElement.classList.add('dark-theme');</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Forecast | Kaayko</title>
  <meta name="robots" content="noindex">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <meta name="theme-color" content="#d4af37">

  <!-- Shared store CSS -->
  <link rel="stylesheet" href="/css/storestyle.css" />
  <link rel="stylesheet" href="/css/header.css" />

  <!-- Page CSS (defines @font-face + --modal-* vars + brand layout) -->
  <link rel="stylesheet" href="/css/forecast.css" />

  <!-- Component CSS (unmodified) -->
  <link rel="stylesheet" href="/js/components/RatingHero.css" />
  <link rel="stylesheet" href="/js/components/SafetyWarnings.css" />
  <link rel="stylesheet" href="/js/components/Heatmap.css" />

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>

<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="header-brand">
        <h1 class="header-title">Kaayko</h1>
        <p class="header-subtitle">Know Before You Go</p>
      </div>
      <nav class="top-menu"><ul></ul></nav>
      <div class="header-controls">
        <button class="theme-toggle-icon material-icons" aria-label="Toggle Dark Mode"></button>
        <button class="fab-menu material-icons mobile-only" aria-label="Open Menu">menu</button>
      </div>
    </div>
    <div class="mobile-menu-overlay">
      <ul></ul>
    </div>
  </header>

  <!-- FORECAST PAGE CONTENT -->
  <main class="forecast-main">

    <!-- Page header: lake name -->
    <div class="forecast-page-header">
      <a class="forecast-back-btn" href="/paddlingout">← Lakes</a>
      <div class="forecast-page-title" id="forecastPageTitle">
        <h2 id="forecastLakeName">Loading…</h2>
        <p id="forecastLakeLocation"></p>
      </div>
    </div>

    <!-- Loading state -->
    <div class="forecast-loading" id="forecastLoading">
      <div class="forecast-spinner"></div>
      <p>Loading conditions…</p>
    </div>

    <!-- Error state -->
    <div class="forecast-error" id="forecastError" style="display:none">
      <div class="forecast-error-icon">⚠</div>
      <h3>Unable to Load Conditions</h3>
      <p>We couldn't fetch the latest data for this location.</p>
      <button class="forecast-retry-btn" id="retryBtn">Try Again</button>
    </div>

    <!-- Main content (hidden until data loads) -->
    <div class="forecast-content" id="forecastContent" style="display:none">

      <!-- Rating hero (full width) -->
      <div id="ratingHeroContainer"></div>

      <!-- Compact warning drawer -->
      <div class="forecast-alert-drawer" id="forecastAlertDrawer"></div>

      <!-- Legacy warnings mount. Kept for compatibility; visible alerts render above. -->
      <div id="safetyWarningsContainer" class="forecast-warnings-row"></div>

      <!-- Heatmap -->
      <div id="heatmapContainer"></div>

      <!-- Location metadata -->
      <div class="forecast-location-info" id="locationInfo"></div>

      <!-- API status footer -->
      <div class="forecast-api-status" id="apiStatus"></div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; <span id="year"></span> Kaayko. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="/js/header.js"></script>
  <script src="/js/components/RatingHero.js"></script>
  <script src="/js/components/SafetyWarnings.js"></script>
  <script src="/js/components/Heatmap.js"></script>
  <script src="/js/services/apiClient.js"></script>
  <script src="/js/services/dataTransformer.js"></script>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── API endpoint helper (mirrors paddlingout.js logic) ──────────────────
    function getApiBase() {
      if (window.FORCE_PRODUCTION_MODE) return window.PRODUCTION_API_BASE;
      const h = window.location.hostname;
      if (h === 'localhost' || h === '127.0.0.1') return `${window.location.origin}/api`;
      return 'https://api-vwcc5j4qda-uc.a.run.app';
    }

    // Sync apiClient with prod-config.js if production is forced
    if (window.FORCE_PRODUCTION_MODE && window.apiClient) {
      window.apiClient.setMode('production');
    }

    // ── Severity helpers ────────────────────────────────────────────────────
    function getScoreSeverity(score) {
      if (score <= 2.0) return 'critical';
      if (score <= 3.5) return 'moderate';
      return 'good';
    }

    function getSkillLevelFromRating(rating) {
      const r = Math.round(parseFloat(rating));
      if (r >= 5) return 'BEGINNERS WELCOME';
      if (r >= 4) return 'BEGINNERS WITH GUIDANCE';
      if (r >= 3) return 'MODERATE SKILL REQUIRED';
      if (r >= 2) return 'EXPERIENCED ONLY';
      return 'NOT RECOMMENDED';
    }

    // ── Timezone helpers (copied from advancedModal.js) ─────────────────────
    function estimateTimezone(lat, lng) {
      if (lat >= 25 && lat <= 49 && lng >= -125 && lng <= -66) {
        if (lng <= -114) return 'America/Los_Angeles';
        if (lng <= -104) return 'America/Denver';
        if (lng <= -87)  return 'America/Chicago';
        return 'America/New_York';
      }
      if (lat >= 37 && lat <= 42 && lng >= -114 && lng <= -109) return 'America/Denver';
      const off = Math.round(lng / 15);
      if (off >= -12 && off <= 12) return `Etc/GMT${off <= 0 ? '+' : '-'}${Math.abs(off)}`;
      return null;
    }

    function formatLocalTime(location, spot) {
      try {
        let tz = location.timeZone || location.timezone;
        const lat = location.coordinates?.latitude || spot?.location?.latitude;
        const lng = location.coordinates?.longitude || spot?.location?.longitude;
        if (!tz && lat && lng) tz = estimateTimezone(lat, lng);
        if (tz && location.localTime) {
          const t = new Date(location.localTime);
          if (!isNaN(t.getTime()))
            return t.toLocaleString('en-US', { timeZone: tz, weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
        }
        if (tz)
          return new Date().toLocaleString('en-US', { timeZone: tz, weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
        return 'Local time unavailable';
      } catch { return 'Local time unavailable'; }
    }

    function formatCoordinates(location, spot) {
      const lat = location.coordinates?.latitude ?? spot.location.latitude;
      const lng = location.coordinates?.longitude ?? spot.location.longitude;
      return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }

    function scoreLabel(score) {
      const r = Math.round(parseFloat(score));
      if (r >= 5) return 'EXCELLENT';
      if (r >= 4) return 'GREAT';
      if (r >= 3) return 'GOOD';
      if (r >= 2) return 'FAIR';
      return 'DANGER';
    }

    function formatHourDisplay(hour) {
      const h = parseInt(hour, 10);
      if (h === 0) return '12:00 AM';
      if (h < 12) return `${h}:00 AM`;
      if (h === 12) return '12:00 PM';
      return `${h - 12}:00 PM`;
    }

    function findBestWindow(currentData, forecastData) {
      const forecast = forecastData?.forecast;
      if (!Array.isArray(forecast)) return null;

      const currentRating = parseFloat(currentData?.paddleScore?.rating ?? 0);
      const currentHour = new Date().getHours();
      let best = null;

      forecast.slice(0, 3).forEach((day, dayIndex) => {
        const hourly = day?.hourly || {};
        Object.keys(hourly).map(Number).sort((a, b) => a - b).forEach(hour => {
          if (dayIndex === 0 && hour <= currentHour) return;
          const hourData = hourly[String(hour)] || hourly[hour];
          const rating = parseFloat(hourData?.mlPrediction?.rating ?? hourData?.prediction?.rating ?? hourData?.rating);
          if (isNaN(rating)) return;
          if (!best || rating > best.score) {
            best = { dayIndex, hour, score: rating, date: day?.date || null };
          }
        });
      });

      if (!best || (best.score < 3 && best.score < currentRating + 0.5)) return null;
      const dayLabel = best.dayIndex === 0 ? 'Later today' : best.dayIndex === 1 ? 'Tomorrow' : 'Day 3';
      return {
        ...best,
        dayLabel,
        timeLabel: `${dayLabel} at ${formatHourDisplay(best.hour)}`,
        label: scoreLabel(best.score)
      };
    }

    function renderTripBriefing(currentData, forecastData) {
      const container = document.getElementById('forecastAlertDrawer');
      if (!container) return;

      const warnings = window.dataTransformer?.prepareWarningsData?.(forecastData) || [];
      const warningItems = Array.isArray(warnings) ? warnings.map(String) : [warnings].filter(Boolean).map(String);
      const penalties = currentData?.paddleScore?.penaltiesApplied || currentData?.paddleScore?.penalties || [];
      penalties
        .filter(Boolean)
        .map(String)
        .forEach(item => {
          const clean = item.replace(/:\s*[-+]?\d+\.?\d*\s*(pts?)?$/i, '').trim();
          if (clean && !warningItems.some(existing => existing.toLowerCase() === clean.toLowerCase())) {
            warningItems.push(clean);
          }
        });

      if (!warningItems.length) {
        container.innerHTML = '';
        container.hidden = true;
        return;
      }

      container.hidden = false;
      container.innerHTML = `
        <section class="forecast-alert-banner is-closed" role="region" aria-label="Paddling alerts">
          <button class="alert-summary" type="button" aria-expanded="false">
            <span class="alert-mark">${warningItems.length}</span>
            <span class="alert-summary-copy">
              <span class="briefing-kicker">Lake alerts</span>
              <span class="alert-summary-title">${warningItems.length} condition${warningItems.length === 1 ? '' : 's'} to review</span>
            </span>
          </button>
          <button class="alert-dismiss" type="button" aria-label="Dismiss lake alerts">×</button>
          <div class="alert-details" hidden>
            ${warningItems.map(warning => `<p>${String(warning)}</p>`).join('')}
          </div>
        </section>
      `;

      const banner = container.querySelector('.forecast-alert-banner');
      const summary = container.querySelector('.alert-summary');
      const details = container.querySelector('.alert-details');
      summary?.addEventListener('click', () => {
        const isOpen = banner.classList.toggle('is-open');
        banner.classList.toggle('is-closed', !isOpen);
        summary.setAttribute('aria-expanded', String(isOpen));
        details.hidden = !isOpen;
      });
      container.querySelector('.alert-dismiss')?.addEventListener('click', () => {
        container.hidden = true;
      });
    }

    // ── Component renderers ─────────────────────────────────────────────────
    function renderHero(currentData, forecastData, spot) {
      if (!currentData?.paddleScore) return;
      const container = document.getElementById('ratingHeroContainer');
      if (!container) return;
      try {
        const ratingHero = new window.RatingHero();
        container.innerHTML = '';
        const rating = currentData.paddleScore.rating;
        const interpretation = {
          skillLevel: getSkillLevelFromRating(rating),
          recommendation: currentData.paddleScore.interpretation,
          details: `Confidence: ${currentData.paddleScore.confidence} | ML Model: ${currentData.paddleScore.mlModelUsed}`,
          penalties: currentData.paddleScore.penalties || [],
          originalRating: currentData.paddleScore.originalRating || rating,
          totalPenalty: currentData.paddleScore.totalPenalty || 0
        };
        const penaltiesApplied = currentData.paddleScore.penaltiesApplied || [];
        const weather = {
          ...currentData.conditions,
          penalties: penaltiesApplied,
          originalRating: currentData.paddleScore.originalMLRating || rating,
          totalPenalty: penaltiesApplied.length > 0
            ? penaltiesApplied.reduce((s, p) => {
                const m = typeof p === 'string' ? p.match(/([-+]\d+\.?\d*)/) : null;
                return s + (m ? parseFloat(m[1]) : 0);
              }, 0)
            : 0,
          hasPenalties: penaltiesApplied.length > 0,
          isGoldStandard: currentData.paddleScore.isGoldStandard
        };
        const element = ratingHero.render(rating, interpretation, weather, forecastData, spot?.id || null);
        container.appendChild(element);
      } catch (err) { console.error('RatingHero error:', err); }
    }

    function renderSafetyWarnings(forecastData) {
      const container = document.getElementById('safetyWarningsContainer');
      if (!container) return;
      container.innerHTML = '';
      container.hidden = true;
    }

    // Segment windows mirror Heatmap.js — kept in sync manually
    const SEGMENT_WINDOWS = [
      { start: 6, end: 8 }, { start: 8, end: 10 }, { start: 10, end: 12 },
      { start: 12, end: 14 }, { start: 14, end: 16 }, { start: 16, end: 18 },
      { start: 18, end: 20 }
    ];

    function renderHeatmap(forecastData) {
      const heatmapData = window.dataTransformer?.prepareHeatmapData?.(forecastData.forecast);
      if (!heatmapData?.length) return;
      const container = document.getElementById('heatmapContainer');
      if (!container) return;
      try {
        const heatmap = new window.Heatmap();
        container.innerHTML = '';
        const el = heatmap.render(heatmapData, forecastData.location, {
          bestWindow: findBestWindow(window.__kaaykoCurrentData, forecastData)
        });
        container.appendChild(el);

        // Post-process: round all displayed segment scores to integers
        container.querySelectorAll('.segment-score').forEach(scoreEl => {
          const val = parseFloat(scoreEl.textContent);
          if (!isNaN(val)) scoreEl.textContent = String(Math.round(val));
        });
        container.querySelectorAll('.heatmap-segment[data-score]').forEach(seg => {
          const val = parseFloat(seg.dataset.score);
          if (!isNaN(val)) seg.dataset.score = String(Math.round(val));
        });
        container.querySelectorAll('.heatmap-best-chip em').forEach(chipEl => {
          const val = parseFloat(chipEl.textContent);
          if (!isNaN(val)) chipEl.textContent = `${Math.round(val)} / 5`;
        });

        // Track pre-click selected state to support toggle-to-collapse
        const preClickMap = new WeakMap();

        container.querySelectorAll('.heatmap-segment').forEach(seg => {
          // Capture selected state BEFORE Heatmap's own click handler fires
          seg.addEventListener('mousedown', () => {
            preClickMap.set(seg, seg.classList.contains('is-selected'));
          }, { passive: true });

          seg.addEventListener('click', () => {
            const dayIndex = parseInt(seg.dataset.day, 10);
            const wasSelected = preClickMap.get(seg) ?? false;

            // ── Close every OTHER day (only one open at a time) ─────────────
            container.querySelectorAll('.heatmap-day').forEach(day => {
              if (parseInt(day.dataset.day, 10) === dayIndex) return;
              day.classList.remove('is-previewing', 'has-selection');
              day.querySelectorAll('.heatmap-segment').forEach(s => s.classList.remove('is-selected'));
              day.querySelector('.heatmap-popover')?.querySelector('.popover-hourly')?.remove();
            });

            // ── Toggle: clicking the already-open segment collapses it ───────
            if (wasSelected) {
              seg.classList.remove('is-selected');
              const parentDay = seg.closest('.heatmap-day');
              parentDay?.classList.remove('has-selection', 'is-previewing');
              seg.closest('.heatmap-bar')?.querySelector('.heatmap-popover')
                ?.querySelector('.popover-hourly')?.remove();
              return;
            }

            // ── Hourly breakdown ─────────────────────────────────────────────
            const segStart = parseInt(seg.dataset.hour, 10);
            const dayData = forecastData.forecast?.[dayIndex];
            if (!dayData?.hourly) return;

            const bar = seg.closest('.heatmap-bar');
            const popover = bar?.querySelector('.heatmap-popover');
            if (!popover) return;

            popover.querySelector('.popover-hourly')?.remove();

            const win = SEGMENT_WINDOWS.find(w => w.start === segStart);
            const endHour = win ? win.end : segStart + 2;

            const rows = [];
            for (let h = segStart; h < endHour; h++) {
              const hourData = dayData.hourly[String(h)] ?? dayData.hourly[h];
              if (!hourData) continue;
              const raw = parseFloat(
                hourData?.mlPrediction?.rating ?? hourData?.prediction?.rating ?? hourData?.rating
              );
              if (isNaN(raw)) continue;
              rows.push(`<div class="popover-hour-row">
                <span>${formatHourDisplay(h)}</span>
                <strong>${Math.round(raw)} / 5</strong>
              </div>`);
            }

            if (rows.length) {
              const hourlyDiv = document.createElement('div');
              hourlyDiv.className = 'popover-hourly';
              hourlyDiv.innerHTML = rows.join('');
              popover.appendChild(hourlyDiv);
            }
          });
        });

      } catch (err) { console.error('Heatmap error:', err); }
    }

    function getAmenityItems(spot) {
      const yn = value => value === true || String(value).toUpperCase() === 'Y';
      const items = [
        { label: 'Parking', available: yn(spot?.parkingAvl) },
        { label: 'Restrooms', available: yn(spot?.restroomsAvl) }
      ];
      const extra = spot?.amenities;
      if (extra && typeof extra === 'object') {
        Object.keys(extra).forEach(key => {
          if (['parking', 'restrooms'].includes(key)) return;
          items.push({
            label: key.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase()),
            available: yn(extra[key])
          });
        });
      }
      return items;
    }

    function renderLocationInfo(location, spot) {
      if (!location) return;
      const amenities = getAmenityItems(spot);
      document.getElementById('locationInfo').innerHTML = `
        <div class="loc-row"><span class="loc-label">Region</span><span>${location.region || '—'}, ${location.country || '—'}</span></div>
        <div class="loc-row"><span class="loc-label">Local Time</span><span>${formatLocalTime(location, spot)}</span></div>
        <div class="loc-row"><span class="loc-label">Coordinates</span><span>${formatCoordinates(location, spot)}</span></div>
        <div class="loc-row loc-amenities"><span class="loc-label">Amenities</span><span class="amenities-list">
          ${amenities.map(item => `<span class="amenity-pill ${item.available ? 'available' : 'unavailable'}">${item.available ? '✓' : '—'} ${item.label}</span>`).join('')}
        </span></div>
      `;
    }

    function renderApiStatus(forecastData) {
      const mlIcon = window.dataTransformer?.getMLStatusIcon?.(forecastData) || '🤖';
      const responseTime = forecastData.metadata?.responseTime || 'N/A';
      const current = window.dataTransformer?.extractCurrentConditions?.(forecastData);
      const source = current?.mlModelUsed === true || current?.predictionSource === 'ml-model'
        ? 'ML forecast'
        : 'Estimated forecast';
      document.getElementById('apiStatus').innerHTML =
        `${mlIcon} ${source} &nbsp;|&nbsp; ${responseTime}`;
    }

    // ── Main load logic ─────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const spotId = params.get('id');
    let currentSpot = null;

    function showError() {
      document.getElementById('forecastLoading').style.display = 'none';
      document.getElementById('forecastError').style.display = 'flex';
    }

    async function loadForecast() {
      document.getElementById('forecastLoading').style.display = 'flex';
      document.getElementById('forecastError').style.display = 'none';
      document.getElementById('forecastContent').style.display = 'none';

      if (!spotId) { showError(); return; }

      const apiBase = getApiBase();

      try {
        // 1. Fetch spot metadata
        const spotRes = await fetch(`${apiBase}/paddlingOut/${encodeURIComponent(spotId)}`);
        if (!spotRes.ok) throw new Error('Spot not found');
        const spot = await spotRes.json();
        currentSpot = spot;

        // Update title immediately
        document.getElementById('forecastLakeName').textContent = spot.title;
        document.getElementById('forecastLakeLocation').textContent = spot.subtitle || '';
        document.title = `${spot.title} Forecast | Kaayko`;

        // Faint lake background — use first available image, fade in behind page
        const bgSrc = (spot.imgSrc?.[0]) || spot.headerImage || spot.coverImage || null;
        if (bgSrc) {
          document.querySelector('.forecast-lake-bg')?.remove();
          const bgEl = document.createElement('div');
          bgEl.className = 'forecast-lake-bg';
          bgEl.style.backgroundImage = `url(${bgSrc})`;
          document.body.prepend(bgEl);
        }

        // 2. Fetch conditions + forecast in parallel — each wrapped so one
        //    failure doesn't kill the other
        const [currentData, forecastData] = await Promise.all([
          window.apiClient.getCurrentData(spot.location.latitude, spot.location.longitude)
            .catch(e => { console.warn('getCurrentData failed:', e); return null; }),
          window.apiClient.getFastForecast(spot.location.latitude, spot.location.longitude)
            .catch(e => { console.warn('getFastForecast failed:', e); return null; })
        ]);

        if (!currentData && !forecastData) throw new Error('Both API calls failed');

        // 3. Update title from API location if custom
        if (forecastData?.location?.name && spot.isCustom) {
          document.getElementById('forecastLakeName').textContent = forecastData.location.name;
        }

        // 4. Render what we have
        window.__kaaykoCurrentData = currentData;
        if (currentData) renderHero(currentData, forecastData, spot);
        renderTripBriefing(currentData, forecastData);
        if (forecastData) renderSafetyWarnings(forecastData);
        if (forecastData) renderHeatmap(forecastData);
        if (forecastData?.location) renderLocationInfo(forecastData.location, spot);
        if (forecastData) renderApiStatus(forecastData);

        // 5. Show content
        document.getElementById('forecastLoading').style.display = 'none';
        document.getElementById('forecastContent').style.display = 'flex';

      } catch (err) {
        console.error('Forecast page error:', err);
        showError();
      }
    }

    // Retry
    document.getElementById('retryBtn').addEventListener('click', loadForecast);

    // Dismiss drawers / popovers when clicking outside them
    document.addEventListener('click', function (e) {
      // Close alert drawer expand if open and click is outside
      const alertDrawer = document.getElementById('forecastAlertDrawer');
      if (alertDrawer && !alertDrawer.hidden && !alertDrawer.contains(e.target)) {
        const banner = alertDrawer.querySelector('.forecast-alert-banner.is-open');
        if (banner) {
          banner.classList.remove('is-open');
          banner.classList.add('is-closed');
          banner.querySelector('.alert-summary')?.setAttribute('aria-expanded', 'false');
          const details = banner.querySelector('.alert-details');
          if (details) details.hidden = true;
        }
      }

      // Clear heatmap selection / popover when clicking outside heatmap
      const heatmapContainer = document.getElementById('heatmapContainer');
      if (heatmapContainer && !heatmapContainer.contains(e.target)) {
        heatmapContainer.querySelectorAll('.heatmap-day').forEach(day => {
          day.classList.remove('is-previewing', 'has-selection');
          day.querySelectorAll('.heatmap-segment').forEach(seg => {
            seg.classList.remove('is-selected', 'is-highlighted');
          });
          day.querySelector('.heatmap-popover')?.querySelector('.popover-hourly')?.remove();
        });
      }
    });

    // Boot
    loadForecast();
  </script>

  <!-- Header scroll hide/show -->
  <script>
    (function () {
      const header = document.querySelector('.header');
      if (!header) return;
      let lastY = 0, ticking = false;
      window.addEventListener('scroll', function () {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function () {
          const y = window.scrollY;
          if (y > 90 && y > lastY) header.classList.add('header-hidden');
          else header.classList.remove('header-hidden');
          lastY = y;
          ticking = false;
        });
      }, { passive: true });
    })();
  </script>
</body>
</html>
